<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>仿B站页面</title>
        <style>
            body{/*主页布局*/
                background: #f1f0f0;
                font-family:"Microsoft YaHei",sans-serif;
                min-height:100vh;
                margin:0;
                padding:0;
                box-sizing:border-box;/*布局不撑大，包含了边距*/
            }
            .demo-nav{/*导航栏*/
                display:flex;
                justify-content:space-between;/*左右分布*/
                align-items:center;
                padding:0 20px;
                background-image:url("nav-bg.jpg");/*图片路径*/
                background-size:cover;/*覆盖*/
                background-position:center;/*水平，垂直居中*/
                background-repeat:no-repeat;/*不重复平铺*/
                height:200px;
                border-radius:8px;
                margin-bottom:20px;
                color:#f1f0f0;
            }
            .demo-nav span{/*导航栏文字*/
                display:inline-block;/*支持transform位移*/
            }
            .demo-nav span:hover{
                color:#00a1d6;
                cursor:pointer;
                transform:translateY(-4px);/*向上跳*/
                transition:all 0.3s 
                cubic-bezier(0.34,1.56,0.64,1);/*缓动函数*/
            }
            .nav-left{/*导航栏左侧*/
                display:flex;
                align-items:center;
                gap:20px;
            }
            .nav-logo{/*导航栏左侧小电视*/
                width:32px;
                height:32px;
                object-fit:contain;/*已设置宽高，保持图片比例*/
                cursor:pointer;
            }
            .nav-logo:hover{
                transform:scale(1.2);
                box-shadow:0 4px 15px rgba(0,0,0,0.2);/*添加阴影*/
            }
            .nav-right{/*导航栏右侧*/
                display:flex;
                align-items:center;
                gap:15px;
                margin-left:auto;/*推到右边*/
            }
            .login{/*登录头像*/
                width:50px;
                height:50px;
                border-radius:50%;
                margin:10px 10px;
                transition:transform 0.3s ease;
                cursor:pointer;
            }
            .login:hover{
                transform:scale(1.3);
            }
            .modal{/*遮罩层弹窗*/
                position:fixed;/*固定定位*/
                inset:0;/*全罩住*/
                background:rgba(0,0,0,0.4);
                display:none;/*默认隐藏*/
                justify-content:center;
                align-items: center;
                z-index:999/*位于最上层*/
            }
            .box{/*登录界面*/
                padding:30px;
                width:40%;
                height:60%;
                border-radius:8px;
                text-align:center;/*水平方向文本对齐*/
                background-image:url("nav-bg.jpg");
                background-size:cover;
                background-position:center;
                background-repeat:no-repeat;
            }
            .box-input{/*登录输入框*/
                width:70%;
                height:50px;
                margin:15px auto;
                padding:0 15px;
                border-radius:8px;
                outline:none;/*去除默认边框*/
                font-size:18px;
                transition:all 0.2s;
            }
            .box-button{/*登录框按钮*/
                width:30%;
                height:40px;
                margin:auto;
                padding:10px 15px;
                border-radius:8px;
                font-size:14px;
                transition:all 0.2s;
            }
            .box-button:hover{
                transform:scale(1.1);
                background:rgba(0,0,0,0.4);
                color:#c2bfbf;
            }
            .search-box{/*导航栏搜索框*/
                background:#c2bfbf;
                display:flex;
                padding:0 20px;
                height:40px;
                border-radius:8px;
                opacity:0.5;
            }
            .search-box input{/*搜索框输入*/
                background:transparent;
                border-radius:8px;
                font-size:14px;
                padding:0 15px;
                outline:none;
            }
            .search-box input::placeholder{
                color:#969191;
                opacity:1;
                border:none;
            }
            .search-box:hover{
                background:#f1f1f1;
                transition:all 0.2s ease;
                cursor:pointer;
                opacity:0.9;
            }
            .search-icon{/*搜索图像*/
                display:flex;
                cursor:pointer;
            }
            .search-icon:hover{
                transform:scale(1.1);
            }
            .action-bar{/*导航栏右侧标签*/
                display:flex;
                align-items:center;
                gap:12px;
            }
            .action-item{/*标签图形+文字*/
                display:flex;
                flex-direction:column;
                align-items:center;
                gap:12px;
                cursor:pointer;
                transition:transform 0.2s;
            }
            .action-btn:hover{
                transform:translateY(-5px);
            }
    



            .main-container{/*轮播+分类栏*/
                display:flex;
                align-items:stretch;
                gap:20px;
                margin:10px 0px;
                height:450px;
            }
            .banner{/*轮播图*/
                width:60%;
                flex-shrink:0;
                height:450px;
                overflow:hidden;/*隐藏超出容器的轮播项*/
                position:relative;
                border-radius:8px;
            }
            .banner-slides{
                display:flex;
                height:100%;
                animation:move 15s infinite;/*动画*/
            }
            .banner-item{
                width:100%;
                height:100%;
                object-fit:cover;/*保持图片比例*/
                flex-shrink:0;
            }
            @keyframes move{/*关键帧*/
            0%{transform:translateX(0)}
            20%{transform:translate(-100%)}
            40%{transform:translate(-200%)}
            60%{transform:translate(-300%)}
            80%{transform:translate(-400%)}
            100%{transform:translate(0)}
            }
            .category-bar{/*右侧分类栏*/
                display:grid;/*网格布局*/
                flex:1;/*填满剩余界面*/
                grid-template-columns:repeat(4,1fr);/*4列*/
                grid-template-rows:repeat(6,1fr);/*六行*/
                border-radius:8px;
                height:450px;
                gap:15px;
                padding:0 15px;
            }
            .change{/*番剧标签另外写*/
                text-decoration:none;
                background:#ecd0f8;
                border-radius:22px;
                color:rgb(241, 115, 47);
                font-size:20px;
                align-items:center;
                justify-content:center;
                white-space:nowrap;
                flex-shrink:0;
                padding:20px 40px;
            }
            .change:hover{
                background:#dab3e9;
                color:#00a1d6;
                cursor:pointer;
                transform:scale(1.1);
                transition:all 0.2s ease;
                opacity:0.9;
                box-shadow:0 4px 15px rgba(0,0,0,0.2);
            }
            
            .category-bar span{
                background:#ecd0f8;
                color:rgb(70, 69, 69);
                border-radius:22px;
                display:flex;
                font-size:20px;
                align-items:center;
                justify-content:center;
                white-space:nowrap;
                flex-shrink:0;
                padding:0 10px;
            }
            .category-bar span:hover{
                background:#dab3e9;
                color:#00a1d6;
                cursor:pointer;
                transform:scale(1.1);
                transition:all 0.2s ease;
                opacity:0.9;
                box-shadow:0 4px 15px rgba(0,0,0,0.2);
            }
        </style>
    </head>
    <body>
        <div class="demo-nav">
            <div class="nav-left">
                <img src="logos/logo.png" alt="B站" class="nav-logo">
                <span>首页</span>
                <span>番剧</span>
                <span>直播</span>
                <span>游戏中心</span>
                <span>会员购</span>
                <span>漫画</span>
                <span>赛事</span>
                <span>AI豆</span>
            </div>           
            <div class="nav-right">
                <img id="login" src="logos/bilibili.png" alt="登陆头像" class="login" onclick="openBox()">
                <div id="modal" class="modal">
                    <div class="box">
                        <div id="loginView">
                            <h3>登录</h3>
                            <input id="user" type="text" placeholder="账号" class="box-input">
                            <input id="pwd" type="password" placeholder="密码" class="box-input">
                            <button onclick="login()" class="box-button">登录</button>
                        </div>
                        <div id="logoutView" style="display:none">
                            <h3>已登录</h3>
                            <button onclick="logout()" class="box-button">退出登录</button>
                        </div>
                        <br>
                        <button onclick="closeBox()" class="box-button">关闭</button>
                    </div>
                </div>
                <script>
                    let isLogin=false;
                    function openBox(){
                        document.getElementById("modal").style.display="flex";
                        if(isLogin){
                            document.getElementById("loginView").style.display="none";
                            document.getElementById("logoutView").style.display="block";
                        }
                        else{
                            document.getElementById("loginView").style.display="block";
                            document.getElementById("logoutView").style.display="none";  
                        }
                    }
                    function closeBox(){
                        document.getElementById("modal").style.display="none";
                    }
                    function login(){
                        isLogin = true;
                        document.getElementById("login").src = "avatar.png";
                        closeBox();
                    }
                    function logout(){
                        isLogin = false;
                        document.getElementById("login").src = "logos/bilibili.png";
                        closeBox();
                    }
                </script>
                <div class="search-box">
                    <input type="text" placeholder="搜索" style="border:none">
                    <img src="logos/search.png" alt="搜索" class="search-icon">
                </div>
                <div class="action-bar">
                    <div class="action-item">
                        <img src="logos/大会员.png" alt="大会员" class="action-btn">
                        <span>大会员</span>
                    </div>
                    <div class="action-item">
                        <img src="logos/消息.png" alt="消息" class="action-btn">
                        <span>消息</span>
                    </div>
                    <div class="action-item">
                        <img src="logos/动态.png" alt="动态" class="action-btn">
                        <span>动态</span>
                    </div>
                    <div class="action-item">
                        <img src="logos/收藏.1.png" alt="收藏" class="action-btn">
                       <span>收藏</span>
                    </div>
                    <div class="action-item">
                        <img src="logos/历史.png" alt="历史" class="action-btn">
                        <span>历史</span>
                    </div>
                    <div class="action-item">
                        <img src="logos/创作中心.png" alt="创作中心" class="action-btn">
                        <span>创作中心</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="main-container">
            <div class="banner">
                <div class="banner-slides">
                    <img src="img/photo.1.jpg" class="banner-item">
                    <img src="img/photo.2.jpg" class="banner-item">
                    <img src="img/photo.3.jpg" class="banner-item">
                    <img src="img/photo.4.jpg" class="banner-item">
                    <img src="img/photo.5.jpg" class="banner-item">
                </div>
            </div>
            <div class="category-bar">
                <a
                href="index.html" target="_blank" class="change">番剧</a>
                <span>国创</span>
                <span>综艺</span>
                <span>动画</span>
                <span>鬼畜</span>
                <span>舞蹈</span>
                <span>娱乐</span>
                <span>科技数码</span>
                <span>美食</span>
                <span>汽车</span>
                <span>体育运动</span>
                <span>电影</span>
                <span>电视剧</span>
                <span>纪录片</span>
                <span>游戏</span>
                <span>音乐</span>
                <span>影视</span>
                <span>知识</span>
                <span>资讯</span>
                <span>小剧场</span>
                <span>时尚美妆</span>
                <span>其他</span>
            </div>
        </div>
    </body>
</html>
