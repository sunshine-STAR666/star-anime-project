<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>个人资料页</title>
        <style>
            body{
                display:flex;
                background: #fff;
                font-family:"Microsoft YaHei",sans-serif;
                min-height:100vh;
                box-sizing:border-box;
                flex-direction:column;
            }
            .header{/*导航栏*/
                display:flex;
                justify-content:space-between;/*左右两端对齐*/
                align-items:center;
                height:60px;
                border-radius:8px;
                margin-bottom:20px;
                background: #f1f0f0;
                box-shadow:0 4px 16px rgba(0,0,0,0.1);
                font-size:14px;
                position:fixed;
                top:0;
                left:0;
                z-index:999;
                width:100%;
            }
            .return{/*返回首页*/
                display:inline-block;
                text-decoration:none;
                color:#00a1d6;
            }
            .return:hover{
                transform:scale(1.1);
            }
            .nav-logo{/*小图标*/
                    width:50px;
                    height:50px;
                    object-fit:contain;
                    cursor:pointer;
                    margin-left:40px;
                }
            
            .header-left{/*导航栏左侧*/
                display:flex;
                align-items:center;
                gap:20px;
            }
            .header-right{/*导航栏右侧*/
                display:flex;
                align-items:center;
                gap:15px;
                margin-left:auto;
            }
            .header span{/*导航栏文字*/
                display:inline-block;/*支持transform位移*/
            }
            .header span:hover{
                color:#00a1d6;
                cursor:pointer;
                transform:translateY(-4px);/*向上跳*/
                transition:all 0.3s 
                cubic-bezier(0.34,1.56,0.64,1);
            }
            .search-box{/*导航栏搜索框*/
                position:relative;
                background:#f1f1f1;
                display:flex;
                width:300px;
                height:40px;
                border-radius:8px;
                opacity:0.5;
                border:1px solid #979292;
                color:#232323;
            }
            .search-box input{/*搜索框输入*/
                background:#f1f1f1;
                flex:1;
                border-radius:8px;
                font-size:14px;
                padding:0 15px;
                outline:none;
            }
            
            .search-box:hover{
                transition:all 0.2s ease;
                cursor:pointer;
            }
            .search-box input::placeholder{
                color:#969191;
                opacity:1;
                border:none;
            }
            .search-icon{/*搜索框图标*/
                display:flex;
                position:relative;
                margin-right:10px;
                cursor:pointer;
            }
            .search-icon:hover{
                transform:scale(1.1);
            }
            .action-bar{/*导航栏右侧标签*/
                display:flex;
                justify-content:space-around;
                align-items:center;
                gap:12px;
                padding:20px 0;
            }
            .action-item{/*标签图形+文字*/
                display:flex;
                flex-direction:column;
                align-items:center;
                gap:12px;
                cursor:pointer;
                transition:transform 0.2s;
            }
            .action-btn{
                height:24px;
                width:24px;
            }
            .action-item img{
                height:20px;
                width:20px;
            }
            .action-btn:hover{
                transform:translateY(-5px);
            }
            .submit{
                background:#f978d0;
                padding:10px 30px;
                border-radius:8px;
                border:none;
                color:#f1f1f1;
                margin-right:40px;
            }
            .submit:hover{
                background:#faa6ec;
                cursor:pointer;
            }
            .main-cover{
                display:flex;
                align-items:flex-start;
                margin-top:60px;
            }
            .main-cover img{
                width:100%;
                height:100px;
                
            }
            .main-card {
                display: flex;
                justify-content:center;
                align-items:flex-start;
                margin:0 auto;
                width:60%;
            }
            .sidebar {
                width: 200px;
                background: #f6f7f8;
                border-right: 1px solid #e3e4e5;
            }
            .sidebar-header{
                padding:18px 25px;
                border-bottom:1px solid #e3e4e5;
                font-size:16px;
                color:#222;
            }
            .sidebar-menu {
                list-style: none;
                padding:0;
                margin:0;
            }
            .menu-item {
                margin: 4px 8px;
            }
            .menu-link {
                display: flex;
                align-items: center;
                padding: 10px 16px;
                border-radius: 6px;
                color: #61666d;
                text-decoration: none;
            }
            .menu-item.active .menu-link {
                background: #00a1d6;
                color: white;
            }
            .main-content {
                display:flex;
                flex-direction:column;
                justify-content:flex-start;
                flex: 1;
                padding: 30px;
                background: #fff;

            }
            .content-top{
                display:flex;
                justify-content:center;
                align-items:center;
                font-size:16px;
                border-bottom:1px solid #e3e4e5;
                color:#222;
            }
            .form-card {
                border-radius: 4px;
                overflow: hidden; /* 配合底部分割线，让圆角切整齐 */
                
            }

            .form-title {
                padding: 15px 25px;
                border-bottom: 1px solid #eee;
                font-size: 16px;
                color: #222;
                border-left: 3px solid #00a1d6;
                padding-left: 10px;
            }

            .form-row {
                display: flex;
                align-items: center;
                padding: 20px 25px;
                border-bottom: 1px solid #eeeeee; 
            }
            /* 最后一行去掉分割线 */
            .form-row:last-child {
                border-bottom: none;
            }

            .form-row label {
                width: 100px;
                color: #666;
            }

            /* 输入框样式 */
            .form-row input[type="text"], .form-row input[type="date"] {
                padding: 6px 8px;
                border: 1px solid #ddd;
                border-radius: 4px; 
            }

            .form-row textarea {
                flex: 1;
                height: 80px;
                border: 1px solid #ddd;
                border-radius: 4px;
                padding: 8px;
            }
            .announcement{
                background:#f3f1f1;
                height:100px;
                resize:none;
                line-height:1.5;
                outline:none;
            }
            .radio-group {
                display: flex;
                gap: 20px;
            }

            .tip-text {
                margin-left: 15px;
                color: #999;
                font-size: 12px;
            }

            .save-btn {
                display:flex;
                margin: 0 auto;
                justify-content:center;
                padding: 8px 24px;
                background: #00a1d6;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                width:100px;
            }

            .avatar-wrap {
                position: relative; 
                width: 320px;
                height: 320px;
                margin: 0 auto;
            }

            
            .avatar {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 160px;
                height: 160px;
                border-radius: 50%;
                object-fit: cover;
                border: 4px solid #e5e9ef;
            }

            .btn-1 {
                position: absolute;
                top: 50%;
                left: 20px;
                transform: translateY(-50%);
                background: #00a1d6;
                color: #fff;
                border: none;
                width: 72px;
                height: 72px;
                border-radius: 50%;
                font-size: 14px;
                cursor: pointer;
                z-index:99;
            }
            .btn-2 {
                position: absolute;
                top: 50%;
                right: 20px;
                transform: translateY(-50%);
                background: #fff;
                color: #333;
                border: 1px solid #ccc;
                width: 72px;
                height: 72px;
                border-radius: 50%;
                font-size: 14px;
                cursor: pointer;
            }
            .menu-link.active{
                background:#00a1d6;
                color:#e5f2ff;
            }
            .main-item{
                display:none;
            }

        </style>
    </head>
    <body>
        <div class="header">
            <div class="header-left">
                <img src="logos/logo.1.png" alt="B站" class="nav-logo">
                <a href="index.html" class="return">首页</a>
                <span>番剧</span>
                <span>直播</span>
                <span>游戏中心</span>
                <span>会员购</span>
                <span>漫画</span>
                <span>赛事</span>
                <span>AI豆</span>
            </div>           
            <div class="header-right">
                <div class="search-box">
                    <input type="text" placeholder="搜索" style="border:none">
                    <img src="logos/search.png" alt="搜索" class="search-icon">
                </div>
                <div class="action-bar">
                    <div class="action-item">
                        <img src="logos/大会员.png" alt="大会员" class="action-btn">
                        <span>大会员</span>
                    </div>
                    <div class="action-item">
                        <img src="logos/消息.png" alt="消息" class="action-btn">
                        <span>消息</span>
                    </div>
                    <div class="action-item">
                        <img src="logos/动态.png" alt="动态" class="action-btn">
                        <span>动态</span>
                    </div>
                    <div class="action-item">
                        <img src="logos/收藏.1.png" alt="收藏" class="action-btn">
                        <span>收藏</span>
                    </div>
                    <div class="action-item">
                        <img src="logos/历史.png" alt="历史" class="action-btn">
                        <span>历史</span>
                    </div>
                    <div class="action-item">
                        <img src="logos/创作中心.png" alt="创作中心" class="action-btn">
                        <span>创作中心</span>
                    </div>
                </div>
                <button onclick="showInfo()" class="submit">投稿</button>
                <script>
                    function showInfo(){
                        alert("感谢你的关注！投稿后续会有哦~");
                    }   
                </script>
            </div>
        </div>
        <div class="main-cover">
            <img src="img.2/photo.40.jpg" alt="封面">
        </div>
        <div class="main-card">
            <div class="sidebar">
                <div class="sidebar-header">
                    <span>个人中心</span>
                </div>
                <ul class="sidebar-menu">
                    <li class="menu-item"><a href="#" class="menu-link">首页</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">大会员</a></li>
                    <li class="menu-item"><a href="#" class="menu-link" >会员积分</a></li>
                    <li class="menu-item"><a href="#" class="menu-link" data-target="page-info">我的信息</a></li>
                    <li class="menu-item"><a href="#" class="menu-link" data-target="page-avatar">我的头像</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">粉丝勋章</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">成就勋章</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">账号安全</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">黑名单管理</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">我的硬币</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">我的记录</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">实名认证</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">邀请注册</a></li>
                    <li class="menu-item"><a href="#" class="menu-link">通知设置</a></li>
                </ul>
            </div>
            <div class="main-content">
                <div class="main-item" id="page-info" style="display:block;"> 
                    <div class="content-top">
                        <span>我的信息</span>
                    </div>
                    <div class="form-card">
                        <div class="form-row">
                            <label for="nickname">昵称:</label>
                            <input type="text" id="nickname" placeholder="star">
                        </div>
                        <div class="form-row">
                            <label for="username">用户名:</label>
                            <input type="text" id="username" value="bili_90587091394"disabled>
                        </div>
                        <div class="form-row">
                            <label for="signature">我的签名:</label>
                            <textarea  class="announcement" id="signature" placeholder="设置您的签名~"></textarea>
                        </div>
                        <div class="form-row">
                            <label>性别:</label>
                            <div class="radio-group">
                                <label><input type="radio" name="gender" value="male">男</label>
                                <label><input type="radio" name="gender" value="female">女</label>
                                <label><input type="radio" name="gender" value="secret">保密</label>
                            </div>
                        </div>
                        <div class="form-row">
                            <label for="birthday">出生日期:</label>
                            <input type="date" id="birthday" value="1980-01-01">
                        </div>
                        <div class="form-row">
                            <label>学校信息:</label>
                            <span style="color:#999; font-size:12px;">*学校信息当前仅支持在App中进行编辑(需升级至6.34及以上版本)</span>
                        </div>
                    </div>
                    <button class="save-btn" id="saveBtn">保存</button>
                </div>
            <div class="main-content" id="page-avatar" style="display:none;">
                <div class="content-top">
                    <span>我的头像</span>
                </div>
                <div class="avatar-section">
                    <div class="avatar-wrap">
                        <button class="btn-1">更换头像</button>
                        <img src="logos/头像.jpg" class="avatar">
                        <button class="btn-2">卸下挂件</button>
                    </div>
                </div>
            </div>
        </div>
        <script>
            let saveBtn=document.getElementById('saveBtn');
            window.onload=function(){
                let data=localStorage.getItem('user');
                if(data)
                {
                    let obj =JSON.parse(data);
                    if(obj.nick){
                        document.getElementById('nickname').value=obj.nick;
                    }
                    if(obj.sign){
                        document.getElementById('signature').value=obj.sign;
                    }
                    if(obj.birth){
                        document.getElementById('birthday').value=obj.birth;
                    }
                    if(obj.gender){
                        let genderEl = document.querySelector(`input[name="gender"] [value="${obj.gender}"]`);
                        if(genderEl){
                            genderEl.checked = true;
                        }
                    }
                }
            }
            document.getElementById('saveBtn').onclick=function(){
                let obj={
                    nick:document.getElementById('nickname').value,
                    sign:document.getElementById('signature').value,
                    birth:document.getElementById('birthday').value,
                    gender:document.querySelector('input[name="gender"]:checked')?.value || 'secret'
                };
                localStorage.setItem('user',JSON.stringify(obj));
                alert('保存成功');
            }
        </script>
        <script>
            const menuLinks = document.querySelectorAll('.menu-link');
            const mainItems = document.querySelectorAll('.main-item');
            menuLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    menuLinks.forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                    const targetId = this.getAttribute('data-target');
                    mainItems.forEach(item => item.style.display = 'none');
                    document.getElementById(targetId).style.display = 'block';
                });
            });
            document.addEventListener('DOMContentLoaded', () => {
                menuLinks[3].classList.add('active');
                mainItems[3].style.display = 'block';
            });
        </script>
    </body>
</html>
